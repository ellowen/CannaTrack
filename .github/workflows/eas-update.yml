name: EAS Update (OTA)

on:
  push:
    branches:
      - main
      - feat/production-launch

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: |
          BRANCH=${{ github.ref_name == 'main' && 'production' || 'preview' }}
          eas update --branch $BRANCH --message "${{ github.event.head_commit.message }}" --non-interactive
        working-directory: mobile
        env:
          EXPO_PUBLIC_APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
